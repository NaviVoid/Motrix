<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Motrix</title>
    <script>
      // Provide process global for electron-is and other packages that
      // expect Node.js process in the renderer (contextIsolation: true
      // disables Node.js globals, so we shim the minimum needed).
      if (typeof global === 'undefined') {
        window.global = globalThis;
      }
      if (typeof process === 'undefined') {
        window.process = {
          type: 'renderer',
          platform: navigator.platform.startsWith('Win') ? 'win32'
            : navigator.platform.startsWith('Mac') ? 'darwin' : 'linux',
          arch: navigator.userAgent.includes('x86_64') || navigator.userAgent.includes('x64') ? 'x64' : 'arm64',
          env: {},
          execPath: '',
          versions: {}
        };
      }
    </script>
  </head>

  <style>
    .skeleton-aside {
      background-color: rgba(0, 0, 0, 0.8);
      width: 78px;
    }
    .skeleton-subnav {
      background-color: #f4f5f7;
      width: 200px;
    }
    .skeleton-main {
      background-color: #fff;
    }

    @media (prefers-color-scheme: dark) {
      .skeleton-aside {
        background-color: rgba(0, 0, 0, 0.9);
      }
      .skeleton-subnav {
        background-color: #2D2D2D;
      }
      .skeleton-main {
        background-color: #343434;
      }
    }
  </style>

  <body>
    <div id="app">
      <div class="title-bar"></div>
      <section class="el-container" id="container">
        <aside class="el-aside skeleton-aside hidden-sm-and-down">
        </aside>
        <aside class="el-aside skeleton-subnav hidden-xs-only">
        </aside>
        <section class="el-container skeleton-main">
        </section>
      </section>
    </div>
    <script type="module" src="./polyfills.ts"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
